services:
  - type: web
    name: sms-backend
    env: docker
    rootDir: Sms_backend
    plan: free
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: DB_URL
        fromDatabase:
          name: sms-db
          property: connectionString
      - key: DB_USERNAME
        fromDatabase:
          name: sms-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: sms-db
          property: password
      # Optionally uncomment and define your JWT secret here if needed
      # - key: JWT_SECRET
      #   generateValue: true

  - type: web
    name: sms-frontend
    env: static
    rootDir: sms-frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    plan: free
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          type: web
          name: sms-backend
          property: host
          # Note: The frontend needs the full URL, e.g. https://sms-backend...
          # You might need to manually set VITE_API_BASE_URL in the Render dashboard 
          # for the frontend if `fromService` doesn't append `https://` properly.
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: sms-db
    databaseName: sms
    user: admin
    plan: free
