# ─── PRODUCTION PROFILE (Neon PostgreSQL) ───────────────────────────────────
# Used on Render: set env var SPRING_PROFILES_ACTIVE=prod
# All values are injected via Render environment variables

spring.datasource.url=${DB_URL}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# Connection pool tuning for Neon (serverless Postgres)
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.max-lifetime=1200000

# Disable verbose SQL in production
spring.jpa.show-sql=false
