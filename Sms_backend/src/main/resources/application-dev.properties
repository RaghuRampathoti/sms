# ─── LOCAL DEVELOPMENT PROFILE (PostgreSQL) ─────────────────────────────────
# Used when running locally: mvn spring-boot:run
# Connects to a local PostgreSQL instance

spring.datasource.url=jdbc:postgresql://localhost:5432/sms_db
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=postgres
spring.datasource.password=1441

# Show SQL in dev for debugging
spring.jpa.show-sql=true
